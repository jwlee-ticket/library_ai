{% extends 'base.html' %}
{% load static %}

{% block breadcrumb %}
    <span class="text-gray-700 font-medium">장르별 대시보드</span>
    <span class="text-gray-400 mx-2">/</span>
    <span class="text-black font-medium">콘서트</span>
{% endblock %}

{% block content %}
    <!-- 페이지 제목 -->
    <div class="mb-6">
        <h1 class="text-3xl font-semibold text-black">콘서트 통합 대시보드</h1>
    </div>
    
    <!-- 요약 카드 섹션 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <!-- 매출 현황 카드 -->
        <div class="bg-white rounded-xl border border-gray-100 p-8 shadow-sm">
            <h3 class="text-lg font-semibold text-black mb-6">매출 현황</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between pb-4 border-b border-gray-100">
                    <span class="text-sm font-medium text-gray-700">오늘 매출</span>
                    <span class="text-2xl font-semibold text-black" id="aggregated-today-revenue">
                        <span class="text-secondary">-</span>
                    </span>
                </div>
            </div>
            
            <!-- 매출 프로그래스 바 -->
            <div class="mt-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium text-gray-700">총 매출</span>
                    <span class="text-sm font-semibold text-black" id="aggregated-total-revenue-text">-</span>
                </div>
                <div class="relative w-full h-3 bg-gray-100 rounded-full overflow-hidden">
                    <div
                        id="aggregated-revenue-progress-bar"
                        class="h-full bg-primary rounded-full transition-all duration-500"
                        style="width: 0%;"
                    ></div>
                    <!-- 손익분기점 마커 -->
                    <div
                        id="aggregated-revenue-bep-marker"
                        class="absolute top-[-2px] bottom-[-2px] w-[2px] bg-danger rounded-full hidden"
                        style="left: 0%;"
                    ></div>
                </div>
                <div class="flex items-center justify-between mt-1 text-xs text-secondary">
                    <span>0원</span>
                    <span id="aggregated-target-revenue-text">-</span>
                </div>
                <div class="flex items-center justify-between mt-2">
                    <span class="text-xs text-gray-500">손익분기점</span>
                    <span class="text-xs font-semibold text-danger" id="aggregated-break-even-text">-</span>
                </div>
            </div>
        </div>
        
        <!-- 판매 매수 현황 카드 -->
        <div class="bg-white rounded-xl border border-gray-100 p-8 shadow-sm">
            <h3 class="text-lg font-semibold text-black mb-6">판매 매수 현황</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between pb-4 border-b border-gray-100">
                    <span class="text-sm font-medium text-gray-700">오늘 판매 매수</span>
                    <span class="text-2xl font-semibold text-black" id="aggregated-today-tickets">
                        <span class="text-secondary">-</span>
                    </span>
                </div>
            </div>
            
            <!-- 판매 매수 프로그래스 바 -->
            <div class="mt-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium text-gray-700">총 판매 매수</span>
                    <span class="text-sm font-semibold text-black" id="aggregated-total-tickets-text">-</span>
                </div>
                <div class="relative w-full h-3 bg-gray-100 rounded-full overflow-hidden">
                    <div
                        id="aggregated-tickets-progress-bar"
                        class="h-full bg-primary rounded-full transition-all duration-500"
                        style="width: 0%;"
                    ></div>
                </div>
                <div class="flex items-center justify-between mt-1 text-xs text-secondary">
                    <span>0매</span>
                    <span id="aggregated-total-seats-text">-</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 데이터 전달용 JSON 스크립트 -->
    <script type="application/json" id="concert-aggregated-data">
    {
        "summaryUrl": "{% url 'dashboard:concert_aggregated_summary' %}"
    }
    </script>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/concert_aggregated_dashboard.js' %}"></script>
{% endblock %}
