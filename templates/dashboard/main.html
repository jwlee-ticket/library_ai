{% extends 'base.html' %}

{% block breadcrumb %}
    <span class="text-gray-700 font-medium">전체</span>
{% endblock %}

{% block content %}
    <!-- 페이지 제목 -->
    <div class="mb-8">
        <h1 class="text-3xl font-semibold text-black">전체</h1>
    </div>
    
    <!-- 통합 대시보드 내용 (추후 구현 예정) -->
    <div class="bg-white rounded-xl border border-gray-100 p-8 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="rounded-lg border border-gray-100 bg-gray-50 p-6">
                <p class="text-sm text-gray-600">전체 매출</p>
                <p class="text-3xl font-bold text-black mt-2">-</p>
            </div>
            <div class="rounded-lg border border-gray-100 bg-gray-50 p-6">
                <p class="text-sm text-gray-600">전체 매수</p>
                <p class="text-3xl font-bold text-black mt-2">-</p>
            </div>
            <div class="rounded-lg border border-gray-100 bg-gray-50 p-6">
                <p class="text-sm text-gray-600">공연 수</p>
                <p class="text-3xl font-bold text-black mt-2">-</p>
            </div>
        </div>
        <div class="mt-6">
            <p class="text-sm text-gray-600">통합 대시보드는 추후 업데이트될 예정입니다.</p>
        </div>
    </div>
{% endblock %}
