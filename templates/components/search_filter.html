{% comment %}
검색/필터 UI 컴포넌트

사용법:
{% include 'components/search_filter.html' with genre_filter=genre_filter search_query=search_query genre_choices=genre_choices %}
{% endcomment %}

<div class="bg-white rounded-xl border border-gray-100 p-6 mb-6">
    <form method="get" class="flex flex-col md:flex-row gap-4">
        <!-- 검색 입력 -->
        <div class="flex-1">
            <input 
                type="text" 
                name="search" 
                value="{{ search_query }}" 
                placeholder="공연명, 공연장, 제작/주최를 검색해보세요" 
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-200 transition-colors"
            >
        </div>
        
        <!-- 장르 필터 -->
        <div class="md:w-48 relative">
            <input type="hidden" name="genre" id="genre-input" value="{{ genre_filter }}">
            <button 
                type="button"
                onclick="toggleGenreFilterDropdown()"
                class="w-full flex items-center px-4 py-3 border-2 border-gray-200 rounded-lg hover:bg-gray-50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-200 transition-colors"
            >
                <svg id="genre-filter-arrow" class="w-4 h-4 transition-transform duration-200 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
                <span id="genre-filter-text" class="flex-1 text-left">
                    {% if genre_filter %}
                        {% for code, name in genre_choices %}
                            {% if code == genre_filter %}{{ name }}{% endif %}
                        {% endfor %}
                    {% else %}
                        전체 장르
                    {% endif %}
                </span>
            </button>
            <div id="genre-filter-dropdown" class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg shadow-lg z-10 max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                <div class="py-1">
                    <button 
                        type="button"
                        onclick="selectGenreFilter('')"
                        class="w-full text-left px-4 py-2 text-sm {% if not genre_filter %}bg-primary-100 text-primary font-medium{% else %}text-black hover:bg-gray-50{% endif %} transition-colors"
                    >
                        전체 장르
                    </button>
                    {% for code, name in genre_choices %}
                        <button 
                            type="button"
                            onclick="selectGenreFilter('{{ code }}')"
                            class="w-full text-left px-4 py-2 text-sm {% if genre_filter == code %}bg-primary-100 text-primary font-medium{% else %}text-black hover:bg-gray-50{% endif %} transition-colors"
                        >
                            {{ name }}
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>
        
        <!-- 검색 버튼 -->
        <div>
            <button 
                type="submit" 
                class="px-6 py-3 bg-primary text-white rounded-lg font-medium hover:bg-primary-900 active:bg-primary-800 transition-colors shadow-sm"
            >
                검색
            </button>
        </div>
        
        <!-- 초기화 버튼 -->
        {% if genre_filter or search_query %}
            <div>
                <a 
                    href="{% url 'performance:list' %}" 
                    class="px-6 py-3 bg-white text-black border-2 border-gray-200 rounded-lg font-medium hover:bg-gray-50 hover:border-gray-300 transition-colors inline-block"
                >
                    초기화
                </a>
            </div>
        {% endif %}
    </form>
</div>

<script>
    function toggleGenreFilterDropdown() {
        const dropdown = document.getElementById('genre-filter-dropdown');
        const arrow = document.getElementById('genre-filter-arrow');
        
        if (dropdown.classList.contains('max-h-0')) {
            dropdown.classList.remove('max-h-0');
            dropdown.classList.add('max-h-96');
            arrow.classList.add('rotate-180');
        } else {
            dropdown.classList.remove('max-h-96');
            dropdown.classList.add('max-h-0');
            arrow.classList.remove('rotate-180');
        }
    }
    
    function selectGenreFilter(code) {
        const input = document.getElementById('genre-input');
        const text = document.getElementById('genre-filter-text');
        const dropdown = document.getElementById('genre-filter-dropdown');
        const arrow = document.getElementById('genre-filter-arrow');
        
        input.value = code;
        
        // 텍스트 업데이트
        const genreNames = {
            '': '전체 장르',
            'theater': '연극',
            'musical': '뮤지컬',
            'concert': '콘서트',
            'exhibition': '전시'
        };
        text.textContent = genreNames[code] || '전체 장르';
        
        // 드롭다운 닫기
        dropdown.classList.remove('max-h-96');
        dropdown.classList.add('max-h-0');
        arrow.classList.remove('rotate-180');
        
        // 폼 자동 제출
        input.closest('form').submit();
    }
    
    // 외부 클릭 시 드롭다운 닫기
    document.addEventListener('click', function(event) {
        const filterContainer = document.querySelector('.md\\:w-48.relative');
        if (filterContainer && !filterContainer.contains(event.target)) {
            const dropdown = document.getElementById('genre-filter-dropdown');
            const arrow = document.getElementById('genre-filter-arrow');
            if (dropdown && !dropdown.classList.contains('max-h-0')) {
                dropdown.classList.remove('max-h-96');
                dropdown.classList.add('max-h-0');
                arrow.classList.remove('rotate-180');
            }
        }
    });
</script>
