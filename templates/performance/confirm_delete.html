{% extends 'base.html' %}

{% block breadcrumb %}
    <span class="text-gray-700 font-medium">공연 관리</span>
    <span class="text-gray-400 mx-2">/</span>
    <span class="text-black font-medium">삭제</span>
{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto mt-12">
        <div class="bg-white rounded-xl border-2 border-red-100 p-8">
            <!-- 경고 아이콘 -->
            <div class="flex justify-center mb-4">
                <svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            
            <!-- 제목 -->
            <h2 class="text-xl font-semibold text-black text-center mb-4">공연 삭제 확인</h2>
            
            <!-- 메시지 -->
            <p class="text-base text-gray-600 text-center mb-6">
                정말로 이 공연을 삭제하시겠어요?
            </p>
            
            <!-- 공연명 강조 -->
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <p class="text-sm text-gray-600 text-center mb-2">삭제할 공연</p>
                <p class="text-lg font-semibold text-red-600 text-center">{{ object.title }}</p>
            </div>
            
            <!-- 경고 메시지 -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <p class="text-sm text-yellow-800 text-center">
                    삭제된 공연은 복구할 수 없어요
                </p>
            </div>
            
            <!-- 버튼 -->
            <form method="post" class="flex gap-3">
                {% csrf_token %}
                <a href="{% url 'performance:detail' object.pk %}" class="flex-1 px-6 py-3 bg-white text-black border-2 border-gray-200 rounded-lg font-medium hover:bg-gray-50 hover:border-gray-300 transition-colors text-center">
                    취소
                </a>
                <button type="submit" class="flex-1 px-6 py-3 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 active:bg-red-700 transition-colors shadow-sm">
                    삭제
                </button>
            </form>
        </div>
    </div>
{% endblock %}
