{% extends 'base.html' %}

{% block breadcrumb %}
    <span class="text-gray-700 font-medium">공연 관리</span>
    <span class="text-gray-400 mx-2">/</span>
    <span class="text-black font-medium">삭제</span>
{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto mt-12">
        <div class="card bg-base-100 border border-base-200 shadow-sm">
            <div class="card-body p-8">
            <!-- 경고 아이콘 -->
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 rounded-full bg-danger/10 text-danger flex items-center justify-center">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- 제목 -->
            <h2 class="text-2xl font-semibold text-black text-center mb-3">공연 삭제 확인</h2>
            
            <!-- 메시지 -->
            <p class="text-base text-gray-600 text-center mb-6">
                정말로 이 공연을 삭제하시겠어요?
            </p>
            
            <!-- 공연명 강조 -->
            <div class="alert bg-danger/10 border border-danger/20 rounded-lg mb-6">
                <p class="text-sm text-gray-600 text-center mb-2">삭제할 공연</p>
                <p class="text-lg font-semibold text-danger text-center">{{ object.title }}</p>
            </div>
            
            <!-- 경고 메시지 -->
            <div class="alert bg-warning/10 border border-warning/20 rounded-lg mb-6">
                <p class="text-sm text-yellow-800 text-center">
                    삭제된 공연은 복구할 수 없어요
                </p>
            </div>
            
            <!-- 버튼 -->
            <form method="post" class="flex gap-3">
                {% csrf_token %}
                <a href="{% url 'performance:detail' object.pk %}" class="btn btn-ghost flex-1">
                    취소
                </a>
                <button type="submit" class="btn btn-error flex-1">
                    삭제
                </button>
            </form>
            </div>
        </div>
    </div>
{% endblock %}
