server {
    listen 80;
    server_name libraryai.co.kr www.libraryai.co.kr;

    # 정적 파일
    location /static/ {
        alias /var/www/library-ai/staticfiles/;
    }

    # 미디어 파일
    location /media/ {
        alias /var/www/library-ai/media/;
    }

    # Django 애플리케이션
    location / {
        proxy_pass http://unix:/var/www/library-ai/library-ai.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

