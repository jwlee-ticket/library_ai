# HTTP 서버 (Certbot 인증서 발급 전)
# Certbot이 인증서를 발급하면 자동으로 HTTPS 설정을 추가하고 HTTP 리다이렉트를 설정합니다.
server {
    listen 80;
    listen [::]:80;
    server_name libraryai.co.kr www.libraryai.co.kr;

    # Let's Encrypt 인증서 발급을 위한 인증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 정적 파일
    location /static/ {
        alias /var/www/library-ai/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 미디어 파일
    location /media/ {
        alias /var/www/library-ai/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django 애플리케이션
    location / {
        proxy_pass http://unix:/var/www/library-ai/library-ai.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
